<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruitizzzz Premium</title>

<style>
body {
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  margin: 0;
}

header {
  background: #ff4d6d;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container { padding: 15px; }

input, button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  border: none;
}

button {
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

.card {
  background: #1c1c2b;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}
h2 { color: #ff8fa3; margin-top: 20px; }
</style>
</head>

<body>

<header>🍓 Fruitizzzz Premium App</header>

<div class="container">

<h3>Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<p id="status"></p>
<p id="user"></p>

<button onclick="loadItems()">Load Menu</button>

<div id="menu"></div>

</div>

<script>
const API = "http://127.0.0.1:3000";

/* LOGIN */
async function login() {
  try {
    const res = await fetch(API + "/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();

    if (data.success) {
      document.getElementById("status").innerText = "Login Successful";
      document.getElementById("user").innerText =
        "Welcome " + data.user.name;
    } else {
      document.getElementById("status").innerText = data.message;
    }
  } catch (e) {
    document.getElementById("status").innerText = "Server Error";
  }
}

/* LOAD ITEMS */
async function loadItems() {
  try {
    const res = await fetch(API + "/api/items");
    const data = await res.json();

    let html = "";

    const c = data.categories;

    for (let key in c) {
      html += `<h2>${key}</h2>`;
      c[key].forEach(i => {
        html += `<div class="card"><span>${i.name}</span><span>₹${i.price}</span></div>`;
      });
    }

    html += "<h2>Combos</h2>";
    data.combos.forEach(i => {
      html += `<div class="card"><span>${i.name}</span><span>₹${i.price}</span></div>`;
    });

    html += `<h2>Special Dish</h2>
      <div class="card">
        <span>${data.specialDish.name}</span>
        <span>₹${data.specialDish.price}</span>
      </div>`;

    html += `<h2>Signature Dish</h2>
      <div class="card">
        <span>${data.signatureDish.name}</span>
        <span>₹${data.signatureDish.price}</span>
      </div>`;

    document.getElementById("menu").innerHTML = html;

  } catch (e) {
    document.getElementById("menu").innerHTML =
      "Failed to load items";
  }
}
</script>

</body>
</html>
