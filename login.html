<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fruitizzzz Login 🔐</title>
<style>
body { font-family: Arial; text-align: center; padding-top: 80px; }
.box { width: 300px; margin: auto; padding: 20px; box-shadow: 0 0 10px #ccc; }
input, button { width: 90%; padding: 10px; margin: 10px 0; }
button { background: green; color: white; border: none; }
#otpBox { display: none; }
</style>
</head>

<body>

<div class="box">
<h2>Fruitizzzz Login 🔐</h2>

<input type="email" id="email" placeholder="Enter email">
<button onclick="sendOTP()">Send OTP</button>

<div id="otpBox">
  <input type="text" id="otp" placeholder="Enter OTP">
  <button onclick="verifyOTP()">Verify OTP</button>
</div>

<p id="msg"></p>
</div>

<script>

let userEmail = "";

function sendOTP() {
  const email = document.getElementById("email").value;

  fetch("http://127.0.0.1:5000/api/otp/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("msg").innerText = data.message;
    document.getElementById("otpBox").style.display = "block";
    userEmail = email;
  });
}

function verifyOTP() {
  const otp = document.getElementById("otp").value;

  fetch("http://127.0.0.1:5000/api/otp/verify", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: userEmail, otp })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", userEmail);

      document.getElementById("msg").innerText = "Login Successful ✅";

      window.location.href = "index.html";
    } else {
      document.getElementById("msg").innerText = data.message;
    }
  });
}

</script>

</body>
</html>
